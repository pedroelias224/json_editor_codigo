<!DOCTYPE html>  
<html lang="es">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>JSON IDE - ELS</title>  
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>  
  
<style>  
  body {  
    margin: 0;  
    background: #1e1e1e;  
    color: white;  
    font-family: Arial;  
  }  
  
  header {  
    background: #111;  
    padding: 10px;  
    text-align: center;  
    font-size: 18px;  
  }  
  
  #editor {  
    width: 100%;  
    height: 400px;  
  }  
  
  .buttons {  
    padding: 10px;  
    text-align: center;  
  }  
  
  button {  
    background: #007acc;  
    color: white;  
    border: none;  
    padding: 10px 15px;  
    margin: 5px;  
    border-radius: 6px;  
    cursor: pointer;  
  }  
  
  button:hover {  
    background: #005f99;  
  }  
  
  #status {  
    text-align: center;  
    margin-top: 10px;  
  }  
  
  .screen {  
    display: none;  
  }  
  
  .active {  
    display: block;  
  }  
  
  .project {  
    background: #2a2a2a;  
    margin: 10px;  
    padding: 10px;  
    border-radius: 6px;  
    display: flex;  
    justify-content: space-between;  
    align-items: center;  
  }  
</style>  
</head>  
  
<body>  
  
<header>json editor de codigo (v1.0)</header>  
  
<!-- MENU PRINCIPAL -->  
<div id="menu" class="screen active">  
  <div class="buttons">  
    <button onclick="nuevoProyecto()">➕ Nuevo proyecto</button>  
  </div>  
  
  <div id="lista"></div>  
</div>  
  
<!-- EDITOR -->  
<div id="editorScreen" class="screen">  
  
  <div id="editor">  
{  
    "nombre": "valor",  
    "entero": 13  
}  
  </div>  
  
  <div class="buttons">  
    <button onclick="validar()">✅ Validar</button>  
    <button onclick="formatear()">🧹 Formatear</button>  
    <button onclick="importarArchivo()">📂 Importar JSON</button>  
    <button onclick="exportar()">💾 Exportar JSON</button>  
    <button onclick="guardar()">💾 Guardar</button>  
    <button onclick="volver()">⬅ Volver</button>  
  </div>  
  
  <input type="file" id="fileInput" accept=".json" style="display:none">  
  
  <p id="status"></p>  
  
</div>  
  
<script>  
  var editor = ace.edit("editor");  
  editor.setTheme("ace/theme/monokai");  
  editor.session.setMode("ace/mode/json");  
  editor.setOptions({  
    fontSize: "14px",  
    showPrintMargin: false  
  });  
  
  let proyectoActual = null;  
  
  function cambiarPantalla(id) {  
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));  
    document.getElementById(id).classList.add("active");  
  }  
  
  function obtenerProyectos() {  
    return JSON.parse(localStorage.getItem("proyectos") || "{}");  
  }  
  
  function guardarProyectos(data) {  
    localStorage.setItem("proyectos", JSON.stringify(data));  
  }  
  
  function renderLista() {  
    const lista = document.getElementById("lista");  
    lista.innerHTML = "";  
  
    const proyectos = obtenerProyectos();  
  
    for (let nombre in proyectos) {  
      const div = document.createElement("div");  
      div.className = "project";  
  
      div.innerHTML = `  
        <span>${nombre}</span>  
        <div>  
          <button onclick="abrirProyecto('${nombre}')">Abrir</button>  
          <button onclick="borrarProyecto('${nombre}')">🗑</button>  
        </div>  
      `;  
  
      lista.appendChild(div);  
    }  
  }  
  
  function nuevoProyecto() {  
    let nombre = prompt("Nombre del proyecto:");  
    if (!nombre) return;  
  
    proyectoActual = nombre;  
    editor.setValue(`{\n    "nombre": "valor",\n    "entero": 13\n}`, -1);  
  
    cambiarPantalla("editorScreen");  
  }  
  
  function abrirProyecto(nombre) {  
    const proyectos = obtenerProyectos();  
    proyectoActual = nombre;  
    editor.setValue(proyectos[nombre], -1);  
    cambiarPantalla("editorScreen");  
  }  
  
  function guardar() {  
    if (!proyectoActual) return;  
  
    const proyectos = obtenerProyectos();  
    proyectos[proyectoActual] = editor.getValue();  
    guardarProyectos(proyectos);  
  
    document.getElementById("status").innerText = "💾 Guardado";  
    renderLista();  
  }  
  
  function borrarProyecto(nombre) {  
    if (!confirm("¿Borrar proyecto?")) return;  
  
    const proyectos = obtenerProyectos();  
    delete proyectos[nombre];  
    guardarProyectos(proyectos);  
  
    renderLista();  
  }  
  
  function volver() {  
    cambiarPantalla("menu");  
    renderLista();  
  }  
  
  function validar() {  
    try {  
      JSON.parse(editor.getValue());  
      document.getElementById("status").innerText = "✔ JSON válido";  
    } catch (e) {  
      document.getElementById("status").innerText = "❌ Error: " + e.message;  
    }  
  }  
  
  function formatear() {  
    try {  
      let obj = JSON.parse(editor.getValue());  
      editor.setValue(JSON.stringify(obj, null, 2), -1);  
      document.getElementById("status").innerText = "✨ Formateado";  
    } catch {  
      document.getElementById("status").innerText = "❌ JSON inválido bro 😭";  
    }  
  }  
  
  function exportar() {  
    const contenido = editor.getValue();  
    const blob = new Blob([contenido], { type: "application/json" });  
    const url = URL.createObjectURL(blob);  
  
    const a = document.createElement("a");  
    a.href = url;  
    a.download = "json_arc.json";  
    a.click();  
  
    URL.revokeObjectURL(url);  
  }  
  
  function importarArchivo() {  
    document.getElementById("fileInput").click();  
  }  
  
  document.getElementById("fileInput").addEventListener("change", function(e) {  
    const file = e.target.files[0];  
    if (!file) return;  
  
    const reader = new FileReader();  
  
    reader.onload = function(event) {  
      try {  
        const contenido = event.target.result;  
        JSON.parse(contenido); // validar  
  
        editor.setValue(contenido, -1);  
        document.getElementById("status").innerText = "📂 JSON importado correctamente";  
      } catch (err) {  
        document.getElementById("status").innerText = "❌ Archivo inválido bro 😭";  
      }  
    };  
  
    reader.readAsText(file);  
  });  
  
  // cargar lista al iniciar  
  renderLista();  
</script>  
  
</body>  
</html>
