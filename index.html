<!-- nueva web code de json -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 📱 Hace que se vea bien en celular -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IDE json code</title>

<!-- 🔥 Monaco (editor de VS Code) -->
<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>

<style>

/* 🎨 Estilo general */
body{
  margin:0;
  font-family:Arial;
  background:#1e1e1e;
  color:white;
}

/* 📄 Escenas (pantallas) */
#menu,#editorScene{
  display:none;
  padding:20px;
}

/* 🔘 Botones */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* 🔵 Botón principal */
.btn{background:#007acc;color:white;}
.btn:hover{background:#005f99;}

/* 🧠 Editor */
#editor{
  width:100%;
  height:70vh;
  border-radius:10px;
  overflow:hidden;
}

</style>
</head>

<body>

<!-- 📋 MENÚ PRINCIPAL -->
<div id="menu">
  <h1>IDE json code v1.0</h1>

  <!-- Crear nuevo proyecto -->
  <button class="btn" onclick="newProject()">Nuevo proyecto</button>

  <!-- Importar archivo JSON -->
  <button class="btn" onclick="importJSON()">Importar JSON</button>

  <h3>Proyectos:</h3>
  <div id="projectsList"></div>
</div>

<!-- 🧾 EDITOR -->
<div id="editorScene">

  <!-- Nombre del archivo -->
  <input id="projectName" placeholder="nombre.json">

  <!-- Editor Monaco -->
  <div id="editor"></div>

  <br>

  <!-- Acciones -->
  <button class="btn" onclick="saveProject()">Guardar</button>
  <button class="btn" onclick="exportJSON()">Exportar</button>
  <button class="btn" onclick="formatJSON()">Formatear</button>
  <button class="btn" onclick="goMenu()">Volver</button>

  <!-- Estado del JSON -->
  <p id="status"></p>
</div>

<script>

let editor; // 🧠 variable global del editor

/* ⚙️ Configuración de Monaco */
require.config({ 
  paths: { 
    vs: 'https://unpkg.com/monaco-editor@0.44.0/min/vs' 
  } 
});

/* 🚀 Inicializar editor */
require(['vs/editor/editor.main'], function () {

  editor = monaco.editor.create(document.getElementById('editor'), {
    value: "{\n  \n}", // contenido inicial
    language: "json",
    theme: "vs-dark",

    automaticLayout: true,

    // 🔥 comportamiento tipo VS Code
    autoClosingBrackets: "always",
    autoClosingQuotes: "always",
    formatOnType: true,
    formatOnPaste: true,
    suggestOnTriggerCharacters: true,
    quickSuggestions: true
  });

  // 🧪 validar JSON cada vez que escribes
  editor.onDidChangeModelContent(validateJSON);
});

/* 🔄 Cambiar entre pantallas */
function show(s){
  menu.style.display="none";
  editorScene.style.display="none";
  document.getElementById(s).style.display="block";
}

/* 🆕 Crear nuevo proyecto */
function newProject(){
  show("editorScene");

  setTimeout(()=>{
    editor.setValue("{\n  \n}");
    projectName.value="";
  },50);
}

/* 🗑️ Eliminar proyecto */
function deleteProject(name){
  if(!confirm("¿Borrar '" + name + "'? 😨")) return;

  let projects = JSON.parse(localStorage.getItem("ELS_projects") || "{}");

  delete projects[name]; // borrar

  localStorage.setItem("ELS_projects", JSON.stringify(projects));

  loadProjects(); // actualizar lista

  alert("Proyecto eliminado 💀");
}

/* ✅ Validar JSON */
function validateJSON(){
  try{
    JSON.parse(editor.getValue());

    status.textContent="✅ válido";
    status.style.color="lightgreen";

  }catch{

    status.textContent="❌ truena 💀";
    status.style.color="red";
  }
}

/* 🧹 Formatear JSON bonito */
function formatJSON(){
  try{
    let obj = JSON.parse(editor.getValue());

    editor.setValue(JSON.stringify(obj,null,2));

  }catch{
    alert("No se puede formatear");
  }
}

/* 💾 Guardar proyecto */
function saveProject(){

  let name = projectName.value.trim();

  if(!name) return alert("Pon nombre 😤");

  try{
    let data = editor.getValue();

    JSON.parse(data);

    let p = JSON.parse(localStorage.getItem("ELS_projects")||"{}");

    p[name]=data; // guardar

    localStorage.setItem("ELS_projects",JSON.stringify(p));

    alert("Guardado 🔥");

  }catch{
    alert("JSON inválido 💀");
  }
}

/* 📂 Cargar lista de proyectos */
function loadProjects(){

  projectsList.innerHTML = "";

  let p = JSON.parse(localStorage.getItem("ELS_projects") || "{}");

  for(let n in p){

    let container = document.createElement("div");

    container.style.display = "flex";
    container.style.justifyContent = "space-between";
    container.style.marginBottom = "5px";

    /* 📂 Botón abrir */
    let openBtn = document.createElement("button");

    openBtn.textContent = n;
    openBtn.style.flex = "1";

    openBtn.onclick = ()=>{
      show("editorScene");

      setTimeout(()=>{
        editor.setValue(p[n]);
        projectName.value = n;
      },50);
    };

    /* 🗑️ Botón borrar */
    let deleteBtn = document.createElement("button");

    deleteBtn.textContent = "🗑️";
    deleteBtn.style.background = "#ff4d4d";

    deleteBtn.onclick = ()=>{
      deleteProject(n);
    };

    container.appendChild(openBtn);
    container.appendChild(deleteBtn);

    projectsList.appendChild(container);
  }
}

/* 📤 Exportar JSON */
function exportJSON(){
  try{
    let data = editor.getValue();

    JSON.parse(data);

    let blob = new Blob([data],{type:"application/json"});

    let a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = (projectName.value||"archivo") + ".json";

    a.click();

  }catch{
    alert("JSON inválido 💀");
  }
}

/* 📥 Importar JSON */
function importJSON(){

  let i=document.createElement("input");

  i.type="file";
  i.accept=".json";

  i.onchange=e=>{

    let f=e.target.files[0];
    let r=new FileReader();

    r.onload=()=>{
      show("editorScene");

      setTimeout(()=>{
        editor.setValue(r.result);
        projectName.value=f.name.replace(".json","");
      },50);
    };

    r.readAsText(f);
  };

  i.click();
}

/* 🔙 Volver al menú */
function goMenu(){
  loadProjects();
  show("menu");
}

/* 🚀 INICIO */
setTimeout(()=>{
  loadProjects();
  show("menu");
},500);

</script>

</body>
</html>
